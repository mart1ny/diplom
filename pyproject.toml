[tool.pytest.ini_options]
addopts = "-ra --cov=scripts --cov-report=term-missing --cov-fail-under=90"
pythonpath = ["."]
testpaths = ["tests"]

[tool.coverage.run]
source = ["scripts"]
omit = [
  "scripts/__init__.py",
  "scripts/inference.py",
  "scripts/pipeline_runner.py",
  "scripts/queue_counter.py",
  "scripts/tracking.py",
]

[tool.coverage.report]
exclude_also = [
  "if __name__ == .__main__.:",
  "if TYPE_CHECKING:",
]

[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [
  "frontend/dist",
  "frontend/node_modules",
  "results",
  "uploads",
]

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82", "I"]
